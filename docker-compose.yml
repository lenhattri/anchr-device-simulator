services:
  emqx:
    image: emqx/emqx:5.8.4
    container_name: anchr-emqx
    ports:
      - "1883:1883"
      - "18083:18083"
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anchr-device-simulator
    depends_on:
      - emqx
    command: ["-config", "/app/config.json"]
    environment:
      MQTT_HOST: emqx
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/config.json:ro
      - simulator-state:/data

volumes:
  simulator-state:
